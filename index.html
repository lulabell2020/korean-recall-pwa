<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Korean Recall Voice PWA</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#111111"/>

<style>
body { margin:0; background:#0b0b0b; color:#f2f2f2; font-family:system-ui; }
.wrap { max-width:900px; margin:auto; padding:16px; }
.card { background:#141414; border:1px solid #2a2a2a; border-radius:16px; padding:14px; margin:12px 0; }
textarea, input { width:100%; background:#0f0f0f; color:#fff; border:1px solid #333; border-radius:12px; padding:10px; }
button { margin-top:8px; padding:10px; border-radius:12px; border:0; font-weight:bold; }
.primary { background:#f2f2f2; color:#000; }
.secondary { background:#222; color:#fff; border:1px solid #333; }
.big { font-size:22px; }
.status { font-weight:800; margin-top:10px; }
.ok { color:#9bff9b; }
.bad { color:#ff8f8f; }
.pill { display:inline-block; padding:4px 10px; border-radius:999px; background:#111; border:1px solid #333; font-size:12px; margin-right:6px;}
</style>
</head>

<body>
<div class="wrap">
<h2>Korean Voice Recall Trainer</h2>

<div class="card">
<textarea id="islandInput" placeholder="English line
Korean line
English line
Korean line"></textarea>

<label><input type="checkbox" id="autoShuffle" checked> Auto Shuffle</label><br>
<label><input type="checkbox" id="lenient" checked> Lenient Matching (Voice Recommended)</label><br>
<label><input type="checkbox" id="speakEnglish" checked> Speak English Automatically</label><br>
<label><input type="checkbox" id="autoMic" checked> Auto Open Mic</label><br>

<button class="primary" id="startBtn">Start Session</button>
</div>

<div class="card" id="session" style="display:none;">
<div class="big" id="promptEN"></div>
<input id="answerInput" placeholder="Voice fills automatically"/>
<div class="status" id="statusLine"></div>
<div id="details"></div>
<div style="margin-top:8px;">
<span class="pill" id="phasePill"></span>
<span class="pill" id="countPill"></span>
<span class="pill" id="wrongPill"></span>
</div>
</div>

</div>

<script>

// -------------------- Utilities --------------------

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function normalizeLenient(s){
  let x=(s||"").trim()
    .replace(/[.,!?~…]/g,"")
    .replace(/\s+/g,"");
  return x;
}

function isCorrect(user,target){
  if(document.getElementById("lenient").checked){
    return normalizeLenient(user)===normalizeLenient(target);
  }
  return user.trim()===target.trim();
}

function speak(text,lang){
  return new Promise(resolve=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang;
    u.rate=1;
    u.onend=resolve;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  });
}

// -------------------- State --------------------

let items=[];
let firstQueue=[];
let wrongSet=new Set();
let retestQueue=[];
let phase="idle";
let current=null;
let firstIndex=0;
let retestIndex=0;

let rec=null;
let speechUnlocked=false;

// -------------------- Parsing --------------------

function parseIsland(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(l=>l);
  if(lines.length%2!==0) throw new Error("Odd number of lines.");
  const arr=[];
  for(let i=0;i<lines.length;i+=2){
    arr.push({en:lines[i],kr:lines[i+1],id:String(i/2)});
  }
  return arr;
}

// -------------------- Recognition --------------------

function startRec(){
  if(!speechUnlocked) return;
  if(!document.getElementById("autoMic").checked) return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  rec=new SR();
  rec.lang="ko-KR";
  rec.interimResults=false;
  rec.maxAlternatives=1;

  rec.onresult=(e)=>{
    const t=e.results[0][0].transcript.trim();
    document.getElementById("answerInput").value=t;
    handleSubmit();
  };

  rec.start();
}

function stopRec(){
  if(rec) rec.stop();
}

// -------------------- Flow --------------------

async function present(){
  document.getElementById("promptEN").textContent=current.en;
  document.getElementById("statusLine").textContent="";
  document.getElementById("details").innerHTML="";
  document.getElementById("answerInput").value="";

  if(document.getElementById("speakEnglish").checked){
    await speak(current.en,"en-US");
  }

  startRec();
}

async function advance(){
  stopRec();

  if(phase==="first"){
    if(firstIndex>=firstQueue.length){
      if(wrongSet.size>0){
        phase="retest";
        retestQueue=shuffle([...wrongSet]);
        retestIndex=0;
      } else {
        phase="complete";
      }
    }
  }

  if(phase==="retest"){
    if(retestIndex>=retestQueue.length){
      phase="complete";
    }
  }

  if(phase==="complete"){
    document.getElementById("promptEN").textContent="Session complete.";
    return;
  }

  current = phase==="first"
    ? items.find(x=>x.id===firstQueue[firstIndex++])
    : items.find(x=>x.id===retestQueue[retestIndex++]);

  updatePills();
  await present();
}

function updatePills(){
  document.getElementById("phasePill").textContent="Phase: "+phase;
  document.getElementById("countPill").textContent=firstIndex+"/"+items.length;
  document.getElementById("wrongPill").textContent="Wrongs: "+wrongSet.size;
}

// -------------------- Submit Logic --------------------

async function handleSubmit(){
  stopRec();
  const attempt=document.getElementById("answerInput").value.trim();
  const correct=isCorrect(attempt,current.kr);

  if(correct){
    document.getElementById("statusLine").textContent="✓";
    document.getElementById("statusLine").className="status ok";
    wrongSet.delete(current.id);
    await advance();
    return;
  }

  wrongSet.add(current.id);
  document.getElementById("statusLine").textContent="INCORRECT";
  document.getElementById("statusLine").className="status bad";
  document.getElementById("details").innerHTML=
    "<b>Your attempt:</b> "+attempt+
    "<br><b>Correct Korean:</b> "+current.kr+
    "<br>Repeat it now.";

  await speak(current.kr,"ko-KR");

  document.getElementById("answerInput").value="";
  startRec();
}

// -------------------- Start --------------------

document.getElementById("startBtn").addEventListener("click",async()=>{
  speechUnlocked=true;
  items=parseIsland(document.getElementById("islandInput").value);
  firstQueue=document.getElementById("autoShuffle").checked
    ? shuffle(items.map(x=>x.id))
    : items.map(x=>x.id);
  wrongSet=new Set();
  firstIndex=0;
  phase="first";
  document.getElementById("session").style.display="block";
  await advance();
});

</script>
</body>
</html>

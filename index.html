<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Korean Voice Recall Trainer</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#111111"/>
<style>
  body{margin:0;background:#0b0b0b;color:#f2f2f2;font-family:system-ui;}
  .wrap{max-width:940px;margin:auto;padding:16px;}
  .card{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:14px;margin:12px 0;}
  textarea,input{width:100%;background:#0f0f0f;color:#fff;border:1px solid #333;border-radius:12px;padding:10px;font-size:16px;}
  button{margin-top:8px;padding:10px 12px;border-radius:12px;border:0;font-weight:700;}
  .primary{background:#f2f2f2;color:#000;}
  .secondary{background:#222;color:#fff;border:1px solid #333;}
  .danger{background:#ff5c5c;color:#000;}
  .big{font-size:22px;line-height:1.35;}
  .status{font-weight:900;margin-top:10px;}
  .ok{color:#9bff9b;}
  .bad{color:#ff8f8f;}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#111;border:1px solid #333;font-size:12px;margin-right:6px;}
  .muted{opacity:.8;}
  label{display:block;margin:6px 0;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .row > div{flex:1;min-width:220px;}
</style>
</head>
<body>
<div class="wrap">
  <h2 style="margin:6px 0 12px;">Korean Voice Recall Trainer</h2>

  <div class="card">
    <div class="muted" style="margin-bottom:8px;">
      Paste **tagged** pairs (one per line):
      <pre style="white-space:pre-wrap;background:#0f0f0f;border:1px solid #333;padding:10px;border-radius:12px;margin:8px 0;">EN: I like to go for walks.
KO: 저는 산책하는 것을 좋아해요.</pre>
    </div>

    <div class="row">
      <div>
        <div class="muted" style="font-size:12px;margin-bottom:6px;">Island name (for saving/loading)</div>
        <input id="islandName" placeholder="e.g., Prompt Style 1" />
      </div>
      <div style="flex:0.8;min-width:180px;">
        <button class="secondary" id="saveBtn">Save</button>
        <button class="secondary" id="loadBtn">Load</button>
        <button class="secondary" id="deleteBtn">Delete</button>
      </div>
    </div>

    <textarea id="islandInput" placeholder="EN: Hello, nice to meet you.
KO: 안녕하세요, 만나서 반가워요."></textarea>

    <div class="row">
      <div>
        <label><input type="checkbox" id="autoShuffle" checked> Auto Shuffle</label>
        <label><input type="checkbox" id="lenient" checked> Lenient matching (recommended)</label>
      </div>
      <div>
        <label><input type="checkbox" id="speakEnglish" checked> Speak EN prompt (English only)</label>
        <label><input type="checkbox" id="autoMic" checked> Auto-open mic after prompt</label>
      </div>
      <div>
        <div class="muted" style="font-size:12px;margin-bottom:6px;">Leniency level</div>
        <select id="leniencyLevel" style="width:100%;background:#0f0f0f;color:#fff;border:1px solid #333;border-radius:12px;padding:10px;font-size:16px;">
          <option value="strict">Strict (exact)</option>
          <option value="normal" selected>Normal (recommended)</option>
          <option value="very">Very lenient (voice)</option>
        </select>
      </div>
    </div>

    <button class="primary" id="startBtn">Start Session</button>
    <button class="secondary" id="stopBtn" style="display:none;">Stop Listening</button>
    <button class="danger" id="endBtn" style="display:none;">End Session</button>

    <div class="muted" style="margin-top:10px;font-size:12px;">
      Voice selected: <span id="voiceInfo">loading…</span>
    </div>
  </div>

  <div class="card" id="session" style="display:none;">
    <div class="big" id="promptEN"></div>
    <div class="muted" id="micState" style="margin-top:6px;"></div>
    <input id="answerInput" placeholder="(Voice fills automatically)"/>
    <div class="status" id="statusLine"></div>
    <div id="details" style="margin-top:8px;"></div>

    <div style="margin-top:10px;">
      <span class="pill" id="phasePill"></span>
      <span class="pill" id="countPill"></span>
      <span class="pill" id="wrongPill"></span>
    </div>
  </div>
</div>

<script>
// =========================
// Helpers
// =========================
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function koreanOnly(s){
  return (s||"")
    .replace(/[^가-힣\s]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function canonicalKorean(s){
  // Korean only, no spaces, no punctuation-ish
  return koreanOnly(s)
    .replace(/[.,!?~…]/g,"")
    .replace(/\s+/g,"")
    .trim();
}

// Simple Levenshtein distance (for lenient matching)
function levenshtein(a,b){
  const n=a.length, m=b.length;
  if(n===0) return m;
  if(m===0) return n;
  const dp=new Array(m+1);
  for(let j=0;j<=m;j++) dp[j]=j;
  for(let i=1;i<=n;i++){
    let prev=dp[0];
    dp[0]=i;
    for(let j=1;j<=m;j++){
      const temp=dp[j];
      const cost=(a[i-1]===b[j-1])?0:1;
      dp[j]=Math.min(dp[j]+1, dp[j-1]+1, prev+cost);
      prev=temp;
    }
  }
  return dp[m];
}

function similarity(a,b){
  // 1.0 = identical
  const A=canonicalKorean(a), B=canonicalKorean(b);
  const maxLen=Math.max(A.length,B.length);
  if(maxLen===0) return 1;
  const d=levenshtein(A,B);
  return 1 - (d/maxLen);
}

function isCorrect(user, target){
  const mode=document.getElementById("leniencyLevel").value;

  const U=canonicalKorean(user);
  const T=canonicalKorean(target);

  if (mode==="strict"){
    return U===T;
  }

  if (U===T) return true;

  // Similarity thresholds
  const sim = similarity(U,T);

  if (mode==="normal"){
    // allow small STT differences
    return sim >= 0.90;
  }

  // very lenient
  return sim >= 0.84;
}

function escapeHtml(s){
  return (s||"")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

// =========================
// Voice selection
// =========================
let VOICES=[], EN_VOICE=null, KO_VOICE=null;

function pickVoices(){
  VOICES = speechSynthesis.getVoices() || [];
  EN_VOICE = VOICES.find(v => (v.lang||"").toLowerCase().startsWith("en-us"))
         || VOICES.find(v => (v.lang||"").toLowerCase().startsWith("en-au"))
         || VOICES.find(v => (v.lang||"").toLowerCase().startsWith("en"))
         || null;
  KO_VOICE = VOICES.find(v => (v.lang||"").toLowerCase().startsWith("ko-kr"))
         || VOICES.find(v => (v.lang||"").toLowerCase().startsWith("ko"))
         || null;

  document.getElementById("voiceInfo").textContent =
    `EN: ${EN_VOICE ? (EN_VOICE.name+" ("+EN_VOICE.lang+")") : "none"} | ` +
    `KO: ${KO_VOICE ? (KO_VOICE.name+" ("+KO_VOICE.lang+")") : "none"}`;
}

function waitForVoices(){
  return new Promise(resolve=>{
    pickVoices();
    if ((speechSynthesis.getVoices()||[]).length) return resolve();
    let tries=0;
    const t=setInterval(()=>{
      pickVoices();
      tries++;
      if ((speechSynthesis.getVoices()||[]).length || tries>20){
        clearInterval(t);
        resolve();
      }
    }, 100);
  });
}

function speak(text, lang, voiceObj){
  return new Promise(resolve=>{
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      if (voiceObj){ u.voice = voiceObj; u.lang = voiceObj.lang; }
      else { u.lang = lang; }
      u.rate=1.0;
      u.onend=resolve;
      u.onerror=resolve;
      speechSynthesis.speak(u);
    } catch { resolve(); }
  });
}

// Echo guard
let lastSpoken="", lastSpokenAt=0;
function markSpoken(text){ lastSpoken=(text||"").trim(); lastSpokenAt=Date.now(); }

// =========================
// Parsing (STRICT EN:/KO: pairs)
// =========================
function parseTaggedIsland(text){
  const lines=(text||"").split("\n").map(l=>l.trim()).filter(l=>l.length>0);

  const pairs=[];
  let currentEN=null;

  for(const line of lines){
    const up=line.toUpperCase();
    if (up.startsWith("EN:")){
      currentEN = line.slice(3).trim();
      continue;
    }
    if (up.startsWith("KO:") || up.startsWith("KR:")){
      const ko = line.slice(3).trim();
      if (!currentEN) throw new Error("Found KO: without a preceding EN: line.");
      pairs.push({ en: currentEN, kr: ko });
      currentEN=null;
      continue;
    }
  }

  if (currentEN) throw new Error("Last EN: line has no matching KO: line.");
  if (!pairs.length) throw new Error("No EN:/KO: pairs found. Make sure your island uses EN: and KO: tags.");

  return pairs.map((p,i)=>({ ...p, id:String(i) }));
}

// =========================
// Save / Load (localStorage)
// =========================
function storageKey(name){ return "kr_island_" + name.toLowerCase().trim(); }
const LAST_KEY = "kr_island_last_name";

function saveIsland(){
  const name = (document.getElementById("islandName").value || "").trim();
  if (!name) { alert("Please enter an island name to save."); return; }
  const text = document.getElementById("islandInput").value || "";
  localStorage.setItem(storageKey(name), text);
  localStorage.setItem(LAST_KEY, name);
  alert(`Saved: ${name}`);
}

function loadIsland(){
  let name = (document.getElementById("islandName").value || "").trim();
  if (!name) name = (localStorage.getItem(LAST_KEY) || "").trim();
  if (!name) { alert("Enter an island name to load."); return; }

  const text = localStorage.getItem(storageKey(name));
  if (!text) { alert(`No saved island found for: ${name}`); return; }

  document.getElementById("islandName").value = name;
  document.getElementById("islandInput").value = text;
  localStorage.setItem(LAST_KEY, name);
  alert(`Loaded: ${name}`);
}

function deleteIsland(){
  const name = (document.getElementById("islandName").value || "").trim();
  if (!name) { alert("Enter an island name to delete."); return; }
  localStorage.removeItem(storageKey(name));
  alert(`Deleted: ${name}`);
}

// =========================
// Session State
// =========================
let items=[], firstQueue=[], wrongSet=new Set(), retestQueue=[];
let phase="idle", current=null, firstIndex=0, retestIndex=0;

let rec=null, speechUnlocked=false;
let busy=false;
let pendingMicTimer=null;

const els={
  promptEN:document.getElementById("promptEN"),
  micState:document.getElementById("micState"),
  answerInput:document.getElementById("answerInput"),
  statusLine:document.getElementById("statusLine"),
  details:document.getElementById("details"),
  session:document.getElementById("session"),
  stopBtn:document.getElementById("stopBtn"),
  endBtn:document.getElementById("endBtn"),
  phasePill:document.getElementById("phasePill"),
  countPill:document.getElementById("countPill"),
  wrongPill:document.getElementById("wrongPill")
};

function setStatus(text, okNull){
  els.statusLine.textContent=text;
  els.statusLine.className="status"+(okNull===true?" ok":okNull===false?" bad":"");
}
function updatePills(){
  els.phasePill.textContent="Phase: "+phase;
  const done = Math.min(items.length, phase==="first" ? firstIndex : (phase==="retest" ? (firstQueue.length + retestIndex) : items.length));
  els.countPill.textContent = done + "/" + items.length;
  els.wrongPill.textContent = "Wrongs: " + wrongSet.size;
}

function clearPendingMic(){
  if (pendingMicTimer) { clearTimeout(pendingMicTimer); pendingMicTimer=null; }
}
function stopRec(){
  clearPendingMic();
  try{ rec && rec.stop(); }catch{}
  rec=null;
  els.micState.textContent="";
  els.stopBtn.style.display="none";
}
function startRecDelayed(ms){
  clearPendingMic();
  pendingMicTimer = setTimeout(()=>startRec(), ms);
}

function startRec(){
  if (!speechUnlocked) return;
  if (!document.getElementById("autoMic").checked) return;
  if (busy) return;

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;

  stopRec();

  rec=new SR();
  rec.lang="ko-KR";
  rec.interimResults=false;
  rec.maxAlternatives=1;

  els.micState.textContent="Listening…";
  els.stopBtn.style.display="inline-block";

  rec.onresult=(e)=>{
    if (busy) return;
    const raw=(e.results?.[0]?.[0]?.transcript||"").trim();

    const tooSoon=(Date.now()-lastSpokenAt)<2200;
    if(tooSoon && normalizeLenient(raw)===normalizeLenient(lastSpoken)){
      startRecDelayed(200);
      return;
    }

    const kr = koreanOnly(raw);
    if(!kr){
      startRecDelayed(200);
      return;
    }

    els.answerInput.value = kr;
    handleSubmit();
  };

  rec.onerror=()=>{
    stopRec();
    if((phase==="first"||phase==="retest") && !busy){
      startRecDelayed(300);
    }
  };

  rec.onend=()=>{
    if((phase==="first"||phase==="retest") && !busy){
      startRecDelayed(300);
    }
  };

  try{ rec.start(); }catch{ stopRec(); }
}

// =========================
// Flow (EN prompt ONLY)
// =========================
async function presentPrompt(){
  els.promptEN.textContent=current.en;
  els.details.innerHTML="";
  els.answerInput.value="";
  setStatus("", null);
  updatePills();

  stopRec();
  busy=true;

  // Speak ONLY English prompt
  if(document.getElementById("speakEnglish").checked){
    markSpoken(current.en);
    await speak(current.en, "en-US", EN_VOICE);
  }

  busy=false;

  // delay to avoid mic catching tail end of EN TTS
  startRecDelayed(550);
}

function pickNext(){
  if(phase==="first"){
    if(firstIndex>=firstQueue.length){
      if(wrongSet.size>0){
        phase="retest";
        retestQueue=document.getElementById("autoShuffle").checked ? shuffle([...wrongSet]) : [...wrongSet];
        retestIndex=0;
      } else {
        phase="complete";
      }
    }
  } else if(phase==="retest"){
    if(retestIndex>=retestQueue.length) phase="complete";
  }

  if(phase==="complete") return null;

  const id = (phase==="first") ? firstQueue[firstIndex++] : retestQueue[retestIndex++];
  return items.find(x=>x.id===id) || null;
}

async function advance(){
  stopRec();
  current = pickNext();

  if(!current){
    phase="complete";
    els.promptEN.textContent="Session complete.";
    els.details.innerHTML="";
    setStatus("", null);
    updatePills();
    stopRec();
    return;
  }

  await presentPrompt();
}

// =========================
// Submit logic (KO spoken only when incorrect)
// =========================
async function handleSubmit(){
  if (busy) return;
  if(phase!=="first" && phase!=="retest") return;
  if(!current) return;

  busy=true;
  stopRec();

  const attempt = koreanOnly((els.answerInput.value||"").trim());
  const target  = (current.kr||"").trim();

  if(isCorrect(attempt, target)){
    setStatus("✓", true);
    wrongSet.delete(current.id);
    busy=false;
    await advance();
    return;
  }

  wrongSet.add(current.id);
  setStatus("INCORRECT", false);
  els.details.innerHTML = `
    <div class="muted"><b>Your attempt (KR only):</b> ${escapeHtml(attempt)}</div>
    <div style="margin-top:6px;"><b>Correct Korean:</b> <span style="font-size:20px;">${escapeHtml(current.kr)}</span></div>
    <div style="margin-top:10px;" class="muted"><b>Repeat the correct Korean now.</b></div>
  `;

  // Speak Korean ONLY after incorrect
  markSpoken(current.kr);
  await speak(current.kr, "ko-KR", KO_VOICE);

  els.answerInput.value="";
  busy=false;

  // re-open mic for repetition
  startRecDelayed(550);
}

// =========================
// Wire up UI
// =========================
document.getElementById("saveBtn").addEventListener("click", saveIsland);
document.getElementById("loadBtn").addEventListener("click", loadIsland);
document.getElementById("deleteBtn").addEventListener("click", deleteIsland);

document.getElementById("startBtn").addEventListener("click", async ()=>{
  speechUnlocked = true;
  await waitForVoices();

  const name = (document.getElementById("islandName").value || "").trim();
  if (name) localStorage.setItem(LAST_KEY, name);

  const text = document.getElementById("islandInput").value || "";
  items = parseTaggedIsland(text);

  const ids = items.map(x=>x.id);
  firstQueue = document.getElementById("autoShuffle").checked ? shuffle(ids) : ids.slice();

  wrongSet = new Set();
  retestQueue = [];
  phase = "first";
  firstIndex = 0;
  retestIndex = 0;

  document.getElementById("session").style.display="block";
  els.endBtn.style.display="inline-block";

  await advance();
});

els.stopBtn.addEventListener("click", ()=>stopRec());

els.endBtn.addEventListener("click", ()=>{
  busy=false;
  stopRec();
  phase="idle";
  current=null;
  items=[]; firstQueue=[]; wrongSet=new Set(); retestQueue=[];
  els.promptEN.textContent="";
  els.details.innerHTML="";
  els.answerInput.value="";
  setStatus("", null);
  document.getElementById("session").style.display="none";
  els.endBtn.style.display="none";
});

// Init voices display + last name
waitForVoices();
const last = localStorage.getItem(LAST_KEY);
if (last) document.getElementById("islandName").value = last;
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Korean Voice Recall Trainer</title>

<style>
body{margin:0;background:#0b0b0b;color:#f2f2f2;font-family:system-ui;}
.wrap{max-width:940px;margin:auto;padding:16px;}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:16px;padding:14px;margin:12px 0;}
textarea,input{width:100%;background:#0f0f0f;color:#fff;border:1px solid #333;border-radius:12px;padding:10px;font-size:16px;}
button{margin-top:8px;padding:10px 12px;border-radius:12px;border:0;font-weight:700;}
.primary{background:#f2f2f2;color:#000;}
.secondary{background:#222;color:#fff;border:1px solid #333;}
.big{font-size:22px;}
.status{font-weight:900;margin-top:10px;}
.ok{color:#9bff9b;}
.bad{color:#ff8f8f;}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;}
</style>
</head>

<body>
<div class="wrap">
<h2>Korean Voice Recall Trainer</h2>

<div class="card">
<input id="islandName" placeholder="Island name"/>
<textarea id="islandInput" placeholder="EN: Hello\nKO: 안녕하세요"></textarea>

<div class="btnrow">
<button id="saveBtn" class="secondary">Save</button>
<button id="loadBtn" class="secondary">Load</button>
<button id="deleteBtn" class="secondary">Delete</button>
</div>

<div class="card">
<div id="savedIslandsList"></div>
</div>

<div class="btnrow">
<button id="startBtn" class="primary">Start</button>
<button id="stopBtn" style="display:none">Stop</button>
<button id="endBtn" style="display:none">End</button>
</div>
</div>

<div id="session" class="card" style="display:none">
<div id="promptEN" class="big"></div>
<input id="answerInput"/>

<div class="btnrow">
<button id="skipWrongBtn" class="secondary">Skip (Wrong)</button>
<button id="skipAcceptBtn" class="secondary">Skip (Accept)</button>
</div>

<div id="statusLine" class="status"></div>
</div>

<script>
// ===== STORAGE =====
function storageKey(name){ return "kr_island_" + name.toLowerCase().trim(); }

function renderSaved(){
  const wrap = document.getElementById("savedIslandsList");
  wrap.innerHTML = "";

  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith("kr_island_")){
      const name = k.replace("kr_island_","");
      const btn = document.createElement("button");
      btn.className="secondary";
      btn.textContent=name;

      btn.onclick=()=>{
        document.getElementById("islandName").value=name;
        document.getElementById("islandInput").value=localStorage.getItem(k);
      };

      wrap.appendChild(btn);
    }
  });
}

document.getElementById("saveBtn").onclick=()=>{
  const name=document.getElementById("islandName").value.trim();
  if(!name) return alert("Enter name");
  localStorage.setItem(storageKey(name),document.getElementById("islandInput").value);
  renderSaved();
};

document.getElementById("loadBtn").onclick=()=>{
  const name=document.getElementById("islandName").value.trim();
  document.getElementById("islandInput").value=localStorage.getItem(storageKey(name))||"";
};

document.getElementById("deleteBtn").onclick=()=>{
  const name=document.getElementById("islandName").value.trim();
  localStorage.removeItem(storageKey(name));
  renderSaved();
};

// ===== TRAINER =====
let pairs=[];
let queue=[];
let wrong=[];
let current=null;
let running=false;
let correctCount=0;
let wrongCount=0;

function parse(text){
  const lines=text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  const out=[];
  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("EN:")){
      const en=lines[i].replace(/^EN:\s*/,"");
      const ko=(lines[i+1]||"").replace(/^KO:\s*/,"");
      if(ko) out.push({en,ko});
      i++;
    }
  }
  return out;
}

function speakEN(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function updateStatus(extra=""){
  document.getElementById("statusLine").innerHTML =
    `${extra} ✔ ${correctCount} | ✗ ${wrongCount} | Remaining: ${queue.length + wrong.length}`;
}

function next(){
  if(!running) return;

  if(!queue.length){
    if(wrong.length){
      queue=[...wrong];
      wrong=[];
    } else {
      updateStatus("Done!");
      return;
    }
  }

  current = queue.shift();

  document.getElementById("promptEN").textContent=current.en;
  document.getElementById("answerInput").value="";
  updateStatus();

  speakEN(current.en);

  startMic();
}

function start(){
  pairs=parse(document.getElementById("islandInput").value);
  if(!pairs.length) return alert("No pairs");

  queue=[...pairs];
  wrong=[];
  correctCount=0;
  wrongCount=0;
  running=true;

  document.getElementById("session").style.display="block";
  document.getElementById("startBtn").style.display="none";
  document.getElementById("stopBtn").style.display="inline";
  document.getElementById("endBtn").style.display="inline";

  next();
}

function stop(){
  running=false;
  recognition?.stop();
}

function end(){
  running=false;
  recognition?.stop();

  document.getElementById("session").style.display="none";
  document.getElementById("startBtn").style.display="inline";
  document.getElementById("stopBtn").style.display="none";
  document.getElementById("endBtn").style.display="none";
}

// ===== MIC =====
let recognition;

function startMic(){
  if(!('webkitSpeechRecognition' in window)) return;

  recognition = new webkitSpeechRecognition();
  recognition.lang = "ko-KR";
  recognition.interimResults = false;

  recognition.onresult = (e)=>{
    const result = e.results[0][0].transcript.trim();
    check(result);
  };

  recognition.start();
}

// ===== CHECK =====
function check(input){
  if(!running) return;

  if(input === current.ko){
    correctCount++;
    updateStatus("<span class='ok'>✓</span>");
    setTimeout(next,400);

  } else {
    wrongCount++;
    wrong.push(current);

    updateStatus(`<span class='bad'>✗</span> ${current.ko}`);

    speakEN(current.en);
    setTimeout(startMic,800);
  }
}

// ===== SKIP =====
document.getElementById("skipWrongBtn").onclick=()=>{
  wrongCount++;
  wrong.push(current);
  next();
};

document.getElementById("skipAcceptBtn").onclick=()=>{
  correctCount++;
  next();
};

// ===== EVENTS =====
document.getElementById("startBtn").onclick=start;
document.getElementById("stopBtn").onclick=stop;
document.getElementById("endBtn").onclick=end;

document.getElementById("answerInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    check(document.getElementById("answerInput").value.trim());
  }
});

// INIT
renderSaved();
</script>
</body>
</html>
